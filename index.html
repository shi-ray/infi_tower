<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通天塔</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #game-container {
            width: 100%;
            max-width: 600px;
            border: 1px solid #30363d;
            padding: 20px;
            border-radius: 8px;
            background-color: #161b22;
        }
        #stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            border-bottom: 1px dashed #30363d;
            padding-bottom: 15px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #58a6ff;
        }
        #relics-bar {
            font-size: 0.9em;
            color: #3fb950;
            margin-bottom: 20px;
            min-height: 20px;
        }
        #story-box {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 100px;
        }
        .choice-btn {
            display: block;
            width: 100%;
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 12px;
            margin-bottom: 10px;
            font-family: inherit;
            font-size: 1em;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
            border-radius: 4px;
        }
        .choice-btn:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
        .warning {
            color: #f85149;
        }
        
        /* 新增：戰鬥畫面專用 CSS */
        .battle-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #21262d;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-bottom: 15px;
        }
        .character {
            width: 40%;
            text-align: center;
        }
        .char-name {
            font-weight: bold;
            margin-bottom: 8px;
            color: #58a6ff;
        }
        .enemy .char-name {
            color: #f85149;
        }
        .hp-bar {
            width: 100%;
            height: 12px;
            background-color: #0d1117;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #30363d;
            margin-bottom: 5px;
        }
        .hp-fill {
            height: 100%;
            background-color: #3fb950;
            width: 100%;
            transition: width 0.3s;
        }
        .enemy-fill {
            background-color: #f85149;
        }
        .hp-text {
            font-size: 0.85em;
        }
        .vs {
            font-weight: bold;
            color: #8b949e;
            font-size: 1.2em;
        }
        #battle-log {
            min-height: 60px;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #0d1117;
            border: 1px dashed #30363d;
            border-radius: 6px;
            font-size: 0.95em;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats-bar">
        <span id="stat-layer">層數: 1</span>
        <span id="stat-hp">HP: 100/100</span>
        <span id="stat-atk">攻: 10</span>
        <span id="stat-def">防: 5</span>
        <span id="stat-coin">金: 0</span>
    </div>
    <div id="relics-bar">銘文：無</div>
    
    <!-- 一般劇情與選項區 -->
    <div id="story-box">系統啟動中...</div>
    <div id="choices-box"></div>

    <!-- 新增：戰鬥畫面區塊 (預設隱藏) -->
    <div id="battle-container" style="display: none;">
        <div class="battle-arena">
            <div class="character">
                <div class="char-name">你</div>
                <div class="hp-bar"><div id="player-hp-fill" class="hp-fill"></div></div>
                <div id="player-battle-hp" class="hp-text">100/100</div>
            </div>
            <div class="vs">VS</div>
            <div class="character enemy">
                <div class="char-name">守衛</div>
                <div class="hp-bar"><div id="enemy-hp-fill" class="hp-fill enemy-fill"></div></div>
                <div id="enemy-battle-hp" class="hp-text">20/20</div>
            </div>
        </div>
        <div id="battle-log">戰鬥即將開始...</div>
        <button id="attack-btn" class="choice-btn" onclick="executeTurn()">攻擊</button>
        <button id="continue-battle-btn" class="choice-btn" style="display: none;" onclick="endCombat()">繼續前進</button>
    </div>
</div>

<script>
    // 遊戲狀態與數值
    let player = {
        layer: 1,
        hp: 100,
        maxHp: 100,
        baseAtk: 10,
        def: 5,
        coin: 0,
        relics: {
            ironWall: 0,  // 鐵壁：每層防+1
            siphon: 0,    // 汲取：戰鬥勝利最大HP+2
            giant: 0      // 巨力：算力額外增加 (防 * 1)
        }
    };

    // 敵人狀態暫存
    let currentEnemy = { hp: 0, maxHp: 0, atk: 0 };

    function getAtk() {
        return player.baseAtk + (player.relics.giant * player.def);
    }

    function updateUI() {
        if (player.hp <= 0) {
            gameOver();
            return;
        }
        if (player.hp > player.maxHp) player.hp = player.maxHp;

        document.getElementById('stat-layer').innerText = `層數: ${player.layer}`;
        document.getElementById('stat-hp').innerText = `HP: ${player.hp}/${player.maxHp}`;
        document.getElementById('stat-atk').innerText = `攻: ${getAtk()}`;
        document.getElementById('stat-def').innerText = `防: ${player.def}`;
        document.getElementById('stat-coin').innerText = `金: ${player.coin}`;

        let relicText = [];
        if (player.relics.ironWall > 0) relicText.push(`[壁]x${player.relics.ironWall}`);
        if (player.relics.siphon > 0) relicText.push(`[汲]x${player.relics.siphon}`);
        if (player.relics.giant > 0) relicText.push(`[力]x${player.relics.giant}`);
        document.getElementById('relics-bar').innerText = relicText.length > 0 ? `銘文：${relicText.join(' ')}` : '銘文：無';
    }

    function renderScene(text, choices) {
        document.getElementById('story-box').innerHTML = text;
        const choicesBox = document.getElementById('choices-box');
        choicesBox.innerHTML = '';
        
        choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = choice.label;
            btn.onclick = choice.action;
            choicesBox.appendChild(btn);
        });
    }

    function nextLayer() {
        player.layer++;
        if (player.relics.ironWall > 0) {
            player.def += player.relics.ironWall;
        }
        generateEvents();
    }

    function generateEvents() {
        updateUI();
        if (player.layer % 10 === 0) {
            renderScene(`你來到了第 ${player.layer} 層，你沒有其他退路，只能選擇迎戰！`, [
                { label: '【首領戰】上吧', action: () => eventCombat() }
            ]);
        } else {
            renderScene(`你來到了第 ${player.layer} 層，前方有幾條路。`, [
                { label: '【戰】踹開大門', action: () => eventCombat() },
                { label: '【探】調查廢墟', action: () => eventExplore() },
                { label: '【商】前往商店', action: () => eventShop() }
            ]);
        }
    }

    // ================= 戰鬥系統 =================
    
    // 初始化戰鬥畫面
    function eventCombat() {
        currentEnemy.maxHp = 20 + Math.floor(Math.pow(player.layer, 2.5) * 0.5);
        currentEnemy.hp = currentEnemy.maxHp;
        currentEnemy.atk = 5 + Math.floor(player.layer * player.layer * 0.2);

        // 隱藏劇情區，顯示戰鬥區
        document.getElementById('story-box').style.display = 'none';
        document.getElementById('choices-box').style.display = 'none';
        document.getElementById('battle-container').style.display = 'block';
        
        document.getElementById('attack-btn').style.display = 'block';
        document.getElementById('continue-battle-btn').style.display = 'none';
        
        document.getElementById('battle-log').innerHTML = `你遭遇了守衛！<br>敵人攻擊力: <span class="warning">${currentEnemy.atk}</span>`;
        updateBattleUI();
    }

    // 更新戰鬥內的血條顯示
    function updateBattleUI() {
        let pPct = Math.max(0, (player.hp / player.maxHp) * 100);
        document.getElementById('player-hp-fill').style.width = pPct + '%';
        document.getElementById('player-battle-hp').innerText = `${player.hp}/${player.maxHp}`;

        let ePct = Math.max(0, (currentEnemy.hp / currentEnemy.maxHp) * 100);
        document.getElementById('enemy-hp-fill').style.width = ePct + '%';
        document.getElementById('enemy-battle-hp').innerText = `${currentEnemy.hp}/${currentEnemy.maxHp}`;
    }

    // 玩家點擊攻擊的單回合結算
    function executeTurn() {
        let pAtk = getAtk();
        currentEnemy.hp -= pAtk;
        let log = `你發動攻擊，造成 ${pAtk} 點傷害！<br>`;

        if (currentEnemy.hp <= 0) {
            // 敵人死亡
            currentEnemy.hp = 0;
            updateBattleUI();
            
            let coinsEarned = 15 + Math.floor(Math.random() * 50);
            player.coin += coinsEarned;
            log += `戰鬥勝利！獲得 ${coinsEarned} 金。<br>`;

            if (player.relics.siphon > 0) {
                let hpBonus = player.relics.siphon * 2;
                player.maxHp += hpBonus;
                player.hp += hpBonus;
                log += `<span style="color:#3fb950">[汲] 觸發：最大HP與當前HP +${hpBonus}！</span><br>`;
            }

            document.getElementById('attack-btn').style.display = 'none';
            document.getElementById('continue-battle-btn').style.display = 'block';
            updateUI();
        } else {
            // 敵人反擊
            let dmgTaken = Math.max(0, currentEnemy.atk - player.def);
            player.hp -= dmgTaken;
            log += `守衛反擊，對你造成了 <span class="warning">${dmgTaken}</span> 點傷害！`;
            updateBattleUI();
            updateUI(); // 如果玩家死亡，這裡會觸發 gameOver()
        }
        document.getElementById('battle-log').innerHTML = log;
    }

    // 離開戰鬥畫面，回到正常流程
    function endCombat() {
        document.getElementById('battle-container').style.display = 'none';
        document.getElementById('story-box').style.display = 'block';
        document.getElementById('choices-box').style.display = 'block';
        nextLayer();
    }

    // ================= 其他事件 =================

    function eventExplore() {
        let roll = Math.random();
        let log = "你在廢墟中翻找...<br><br>";
        if (roll < 0.3) {
            let dmg = Math.max(1, 15 - player.def);
            player.hp -= dmg;
            log += `觸發陷阱！受到 <span class="warning">${dmg}</span> 點傷害。`;
        } else if (roll < 0.7) {
            player.baseAtk += 2;
            log += `找到武器。攻 +2！`;
        } else {
            let coinBonus = 25;
            player.coin += coinBonus;
            log += `發現寶藏！獲得 ${coinBonus} 金。`;
        }
        renderScene(log, [{ label: '繼續前進', action: () => nextLayer() }]);
        updateUI();
    }

    function eventShop() {
        let log = "你到了商店。";
        let choices = [{ label: '離開商店', action: () => nextLayer() }];

        if (player.coin >= 30) {
            choices.unshift({ 
                label: '花費 30 金：購買【壁】銘文 (每層防+1)', 
                action: () => { player.coin -= 30; player.relics.ironWall++; eventShop(); } 
            });
        }
        if (player.coin >= 40) {
            choices.unshift({ 
                label: '花費 40 金：購買【汲】銘文 (戰鬥勝利最大HP+2)', 
                action: () => { player.coin -= 40; player.relics.siphon++; eventShop(); } 
            });
        }
        if (player.coin >= 50) {
            choices.unshift({ 
                label: '花費 50 金：購買【力】銘文 (攻附加防數值)', 
                action: () => { player.coin -= 50; player.relics.giant++; eventShop(); } 
            });
        }
        if (player.coin >= 15) {
            choices.unshift({ 
                label: '花費 15 金：恢復 30 HP', 
                action: () => { player.coin -= 15; player.hp += 30; eventShop(); } 
            });
        }
        renderScene(log, choices);
        updateUI();
    }

    function gameOver() {
        document.getElementById('stats-bar').style.display = 'none';
        document.getElementById('relics-bar').style.display = 'none';
        document.getElementById('battle-container').style.display = 'none'; // 隱藏戰鬥介面
        document.getElementById('story-box').style.display = 'block';
        document.getElementById('choices-box').style.display = 'block';
        
        renderScene(`<span class="warning">你死啦哈哈。</span><br>你最終抵達了第 ${player.layer} 層。`, [
            { label: '重啟', action: () => location.reload() }
        ]);
    }

    // 遊戲初始化
    generateEvents();
</script>
</body>
</html>
